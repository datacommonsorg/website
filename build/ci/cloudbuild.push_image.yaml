# Manual Cloud Build pipeline for building and pushing images to GCR.
# Trigger this manually (e.g., via /scripts/push_image.sh) for development deployments or testing custom images.
# This is NOT used by the official CI/CD pipeline nor any automated triggers.

steps:
  - id: resolve-hashes
    name: gcr.io/cloud-builders/git
    entrypoint: "bash"
    args:
      - -c
      - |
        # If the .git metadata directory is present, query Git for the commit hashes.
        # Otherwise, fall back to the hashes supplied via Cloud Build substitutions.
        if [ -d .git ]; then
          git rev-parse --short=7 HEAD > website_hash.txt
          git rev-parse --short=7 HEAD:mixer > mixer_hash.txt
        else
          echo "${_WEBSITE_HASH:-unknown}" > website_hash.txt
          echo "${_MIXER_HASH:-unknown}" > mixer_hash.txt
        fi

  - id: push-web-server
    name: gcr.io/cloud-builders/docker
    entrypoint: "bash"
    args:
      - -c
      - |
        set -e
        DOCKER_BUILDKIT=1
        docker build -f build/web_server/Dockerfile --tag gcr.io/$_PROJECT_ID/datacommons-website:${_TAG} .
        docker push gcr.io/$_PROJECT_ID/datacommons-website:${_TAG}

  - id: push-cdc-services
    name: gcr.io/cloud-builders/docker
    entrypoint: "bash"
    args:
      - -c
      - |
        set -e
        DOCKER_BUILDKIT=1
        # Bundle container with website, esp and mixer.
        docker build -f build/cdc_services/Dockerfile \
          --build-arg MIXER_HASH=$(cat mixer_hash.txt) \
          --build-arg WEBSITE_HASH=$(cat website_hash.txt) \
          --tag gcr.io/$_PROJECT_ID/datacommons-services:${_TAG} \
          .
        docker push gcr.io/$_PROJECT_ID/datacommons-services:${_TAG}
    waitFor: ["resolve-hashes"]

  - id: push-nl-server
    name: gcr.io/cloud-builders/docker
    entrypoint: "bash"
    args:
      - -c
      - |
        set -e
        DOCKER_BUILDKIT=1 docker build -f build/nl_server/Dockerfile --tag gcr.io/$_PROJECT_ID/datacommons-nl:${_TAG} .
        docker push gcr.io/$_PROJECT_ID/datacommons-nl:${_TAG}
    waitFor: ["-"]

  - id: push-nodejs-server
    name: gcr.io/cloud-builders/docker
    entrypoint: "bash"
    args:
      - -c
      - |
        set -e
        DOCKER_BUILDKIT=1 docker build -f build/nodejs_server/Dockerfile --tag gcr.io/$_PROJECT_ID/datacommons-nodejs:${_TAG} .
        docker push gcr.io/$_PROJECT_ID/datacommons-nodejs:${_TAG}
    waitFor: ["-"]

  - id: push-website-cron-testing
    name: gcr.io/cloud-builders/docker
    entrypoint: "bash"
    args:
      - -c
      - |
        set -e
        DOCKER_BUILDKIT=1
        docker build -f build/website_cron_testing/Dockerfile \
          --tag gcr.io/$_PROJECT_ID/website-cron-testing:${_TAG} \
          .
        docker push gcr.io/$_PROJECT_ID/website-cron-testing:${_TAG}
    waitFor: ["-"]

substitutions:
  _TAG: ""
  _PROJECT_ID: "datcom-ci"
  _WEBSITE_HASH: ""
  _MIXER_HASH: ""

timeout: 3600s
options:
  dynamic_substitutions: true
  machineType: "E2_HIGHCPU_32"
