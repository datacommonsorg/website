steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'dc-autopush'
      - '--project'
      - 'datcom-website-dev'
      - '--image'
      - 'gcr.io/datcom-ci/datacommons-services:latest'
      - '--region'
      - 'us-central1'
      - '--update-env-vars'
      - 'RESTART_TIMESTAMP=${BUILD_ID}'

tags:
  - 'cloudrun--dc-autopush'
